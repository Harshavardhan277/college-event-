{% extends 'stu_layout.html' %}

{% block student_content %}
<div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
    <div class="p-6 border-b border-slate-100 bg-slate-50/50">
        <h2 class="text-lg font-bold text-slate-900">Account Settings</h2>
        <p class="text-sm text-slate-500">Manage your credit goals and participation categories.</p>
    </div>

    <form action="{{ url_for('stu.settings') }}" method="POST" class="p-6 space-y-8">
        <input type="hidden" name="action" value="update_credits">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- EE Credits -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700">EE Credits Initial Value</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                    </span>
                    <input type="number" name="ee_credits" value="{{ current_user.ee_credits | default(0) }}" min="0" max="8"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all">
                </div>
                <p class="text-xs text-slate-400 italic">Target: 8 Credits</p>
            </div>

            <!-- Group 2 -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700">Group 2 Initial Value</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </span>
                    <input type="number" name="group2_credits" value="{{ current_user.group2_credits | default(0) }}" min="0" max="7"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <p class="text-xs text-slate-400 italic">Target: 7 Credits</p>
            </div>

            <!-- Group 3 -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700">Group 3 Initial Value</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </span>
                    <input type="number" name="group3_credits" value="{{ current_user.group3_credits | default(0) }}" min="0" max="7"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-pink-500 focus:border-pink-500 outline-none transition-all">
                </div>
                <p class="text-xs text-slate-400 italic">Target: 7 Credits</p>
            </div>
        </div>

        <div class="flex justify-end pt-4 border-t border-slate-100">
            <button type="submit"
                class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 transition-all transform hover:-translate-y-0.5">
                Save Credits
            </button>
        </div>
    </form>
</div>

<div class="mt-8 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
    <div class="p-6 border-b border-slate-100 bg-slate-50/50">
        <h2 class="text-lg font-bold text-slate-900">Security</h2>
        <p class="text-sm text-slate-500">Update your account password.</p>
    </div>

    <form action="{{ url_for('stu.settings') }}" method="POST" class="p-6 space-y-6 max-w-md">
        <input type="hidden" name="action" value="change_password">
        
        <div class="space-y-2">
            <label class="block text-sm font-bold text-slate-700">Current Password</label>
            <input type="password" name="current_password" required
                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <div class="space-y-2">
            <label class="block text-sm font-bold text-slate-700">New Password</label>
            <input type="password" name="new_password" required
                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <div class="space-y-2">
            <label class="block text-sm font-bold text-slate-700">Confirm New Password</label>
            <input type="password" name="confirm_password" required
                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <div class="flex justify-start pt-4 border-t border-slate-100">
            <button type="submit"
                class="px-8 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-lg shadow-slate-100 transition-all transform hover:-translate-y-0.5">
                Change Password
            </button>
        </div>
    </form>
</div>
</div>
{% endblock %}
