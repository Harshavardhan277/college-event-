{% extends 'base.html' %}

{% block title %}Login - CEAM{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 leading-tight">Welcome Back</h1>
            <p class="text-slate-500 mt-2">Sign in to your <span class="font-bold text-indigo-600 uppercase">{{ role |
                    default('Student') }}</span> portal</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username or ID</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none bg-slate-50"
                    placeholder="e.g. STU12345">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none bg-slate-50"
                    placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-600">Remember me</label>
                </div>
                <a href="{{ url_for('auth.forgot_password') }}"
                    class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Forgot
                    password?</a>
            </div>

            <button type="submit"
                class="w-full py-4 px-6 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 transition-all transform active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center space-y-3">
            <p class="text-sm text-slate-500">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}"
                    class="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Create Account</a>
            </p>
            <div class="pt-2">
                <a href="{{ url_for('index') }}" 
                   class="text-sm font-medium text-slate-400 hover:text-indigo-500 transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Back to Home Page
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
